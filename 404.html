<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <meta property="og:title" content="404 — DonEli Baize">
  <meta property="og:description" content="That page isn't here. Head back to the portfolio.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://doneliezer.com/404.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #FBFAF7;
      --surface:   #F4F2EC;
      --text:      #1A1A18;
      --muted:     #6E6B66;
      --faint:     #A09C95;
      --line:      #E5E2DA;
      --accent:    #B85432;
      --accent-bg: #F4E5DC;

      --font-display: 'Fraunces', Georgia, serif;
      --font-body:    'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;

      --max:    760px;
      --gutter: clamp(1.25rem, 5vw, 2.5rem);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #121110;
        --surface:   #1C1B19;
        --text:      #F2EFE9;
        --muted:     #9E9A92;
        --faint:     #6B6862;
        --line:      #2A2926;
        --accent:    #E07F5C;
        --accent-bg: #2A1D16;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; transition: color 0.2s ease; }
    a:hover { color: var(--accent); }

    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 var(--gutter);
      width: 100%;
    }

    /* Header */
    header {
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid var(--line);
    }
    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .brand {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .brand::before { content: "—— "; color: var(--faint); }
    nav ul {
      display: flex;
      gap: 1.75rem;
      list-style: none;
    }
    nav a {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 0;
    }

    .lost {
      text-align: center;
    }
    .code {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
    }
    .code::before {
      content: "";
      width: 24px;
      height: 1px;
      background: var(--accent);
    }
    h1 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(2.5rem, 7vw, 4rem);
      line-height: 1.1;
      letter-spacing: -0.025em;
      margin-bottom: 1.5rem;
      font-variation-settings: "opsz" 144;
    }
    .lead {
      font-family: var(--font-display);
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      line-height: 1.6;
      color: var(--muted);
      max-width: 38ch;
      margin: 0 auto 2.5rem;
    }
    .home-link {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      border-bottom: 1px solid var(--line);
      padding-bottom: 2px;
      transition: border-color 0.2s ease, color 0.2s ease;
    }
    .home-link:hover {
      border-bottom-color: var(--accent);
      color: var(--accent);
    }

    footer {
      padding: 2rem 0;
      border-top: 1px solid var(--line);
    }
    .colophon {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--faint);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <div class="header-inner">
        <a href="/" class="brand">DonEli Baize</a>
        <nav>
          <ul>
            <li><a href="/#work">Work</a></li>
            <li><a href="/#case-studies">Cases</a></li>
            <li><a href="/patent.html">Patent</a></li>
            <li><a href="/#contact">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <div class="lost">
        <div class="code">404 · Not found</div>
        <h1>That page isn't here.</h1>
        <p class="lead">
          Wrong URL, deleted page, or a link that aged out. The portfolio is still in one piece.
        </p>
        <a href="/" class="home-link">Back to the portfolio →</a>
      </div>
    </main>

    <footer>
      <div class="colophon">
        © 2026 DonEli Baize · Designed &amp; built by hand
      </div>
    </footer>

  </div>

</body>
</html>
